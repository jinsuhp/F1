<html>
  <head>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="script.js"></script>
    <script src = "wall.js"></script>
    <script src = "mapSelector.js"></script>

    <style>
       #menu {
      position:absolute;
      width:100%;
      height:100%;
      background:black;
      color:white;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:20px;
      z-index:10;
    }
    </style>
    
  </head>
  <body>
    <a-scene>
      <div id="menu">
        <h1>Select Your Map</h1>
        <button onclick="selectMap('track')"> Easy </button>
        <button onclick="selectMap('track2')"> Hard </button>
      </div>

      <a-assets>
        <a-asset-item id = "track" src = "track.glb"></a-asset-item>
        <a-asset-item id = "track2" src = "track2.glb"></a-asset-item>
        <img src = "sun.png" id = "sun"> 
        
      </a-assets>
      <a-gltf-model id = "trackModel" position = "50 1 250" scale = "6.07 6.07 6.07"></a-gltf-model>
    
      
      <a-sky src = "#sun" color = "sky blue"></a-sky>
      <a-camera wasd-controls="acceleration: 500; fly: true" position="-30 250 0">
      </a-camera>
    </a-scene>
  </body>
</html>
